<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>{{ action }} Product | Hope Kuku Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
        .form-container { max-width: 700px; margin: 50px auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: var(--shadow); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; }

        /* Drag and Drop Zone */
        .drop-zone {
            width: 100%;
            height: 200px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 500;
            font-size: 1.2rem;
            cursor: pointer;
            color: #cccccc;
            border: 4px dashed var(--primary);
            border-radius: 10px;
            transition: 0.3s;
        }
        .drop-zone--over { border-style: solid; background: #fff7f0; }
        .drop-zone__input { display: none; }
        .drop-zone__thumb {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            overflow: hidden;
            background-color: #cccccc;
            background-size: cover;
            position: relative;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>{{ action }} Product</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" name="name" value="{{ product.name if product else '' }}" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" name="category" value="{{ product.category if product else '' }}" required>
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
                <div class="form-group">
                    <label>Selling Price (KES)</label>
                    <input type="number" step="0.01" name="price" value="{{ product.price if product else '' }}" required>
                </div>
                <div class="form-group">
                    <label>Cost Price (KES)</label>
                    <input type="number" step="0.01" name="cost_price" value="{{ product.cost_price if product else '' }}" required>
                </div>
            </div>

            <div class="form-group">
                <label>Stock Level</label>
                <input type="number" name="stock_level" value="{{ product.stock_level if product else '100' }}">
            </div>

            <div class="form-group">
                <label>Product Image (Drag & Drop or Click)</label>
                <div class="drop-zone">
                    <span class="drop-zone__prompt">Drop file here or click to upload</span>
                    <input type="file" name="image_file" class="drop-zone__input">
                </div>
                <p style="text-align:center; margin:10px 0;">- OR -</p>
                <input type="text" name="image_url" placeholder="Existing URL (e.g. images/drumstick.jpg)" value="{{ product.image_url if product else '' }}">
            </div>

            <div class="form-group">
                <label>Tags (comma separated)</label>
                <input type="text" name="tags" value="{{ product.tags if product else '' }}">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4">{{ product.description if product else '' }}</textarea>
            </div>

            {% if product %}
            <div class="form-group">
                <label>
                    <input type="checkbox" name="is_active" {{ 'checked' if product.is_active else '' }}>
                    Product is Active
                </label>
            </div>
            {% endif %}

            <div style="display:flex; gap:10px;">
                <button type="submit" class="btn btn-primary" style="flex:1;">Save Product</button>
                <a href="{{ url_for('admin_products') }}" class="btn" style="flex:1; background:#eee; text-align:center;">Cancel</a>
            </div>
        </form>
    </div>

    <script>
        document.querySelectorAll(".drop-zone__input").forEach((inputElement) => {
            const dropZoneElement = inputElement.closest(".drop-zone");

            dropZoneElement.addEventListener("click", (e) => {
                inputElement.click();
            });

            inputElement.addEventListener("change", (e) => {
                if (inputElement.files.length) {
                    updateThumbnail(dropZoneElement, inputElement.files[0]);
                }
            });

            dropZoneElement.addEventListener("dragover", (e) => {
                e.preventDefault();
                dropZoneElement.classList.add("drop-zone--over");
            });

            ["dragleave", "dragend"].forEach((type) => {
                dropZoneElement.addEventListener(type, (e) => {
                    dropZoneElement.classList.remove("drop-zone--over");
                });
            });

            dropZoneElement.addEventListener("drop", (e) => {
                e.preventDefault();

                if (e.dataTransfer.files.length) {
                    inputElement.files = e.dataTransfer.files;
                    updateThumbnail(dropZoneElement, e.dataTransfer.files[0]);
                }

                dropZoneElement.classList.remove("drop-zone--over");
            });
        });

        function updateThumbnail(dropZoneElement, file) {
            let thumbnailElement = dropZoneElement.querySelector(".drop-zone__thumb");

            if (dropZoneElement.querySelector(".drop-zone__prompt")) {
                dropZoneElement.querySelector(".drop-zone__prompt").remove();
            }

            if (!thumbnailElement) {
                thumbnailElement = document.createElement("div");
                thumbnailElement.classList.add("drop-zone__thumb");
                dropZoneElement.appendChild(thumbnailElement);
            }

            thumbnailElement.dataset.label = file.name;

            if (file.type.startsWith("image/")) {
                const reader = new FileReader();

                reader.readAsDataURL(file);
                reader.onload = () => {
                    thumbnailElement.style.backgroundImage = `url('${reader.result}')`;
                };
            } else {
                thumbnailElement.style.backgroundImage = null;
            }
        }
    </script>
</body>
</html>
