<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Hope Kuku Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: var(--shadow); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Forgot Password</h2>
        <p>Enter your email to receive a reset link.</p>
        {% with messages = get_flashed_messages() %}
          {% if messages %}{% for message in messages %}<div style="color:red;">{{ message }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Link</button>
        </form>
        <p style="margin-top:1rem;"><a href="{{ url_for('login') }}">Back to Login</a></p>
    </div>
</body>
</html>
