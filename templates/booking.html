<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book a Table | Hope Kuku Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
        .booking-container { max-width: 500px; margin: 80px auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: var(--shadow); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Table Reservation</div>
        <a href="{{ url_for('index') }}">Back to Home</a>
    </nav>

    <div class="booking-container">
        <h2>Reserve a Table</h2>
        <p>Book your spot for an amazing dine-in experience.</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Number of Guests</label>
                <input type="number" name="guest_count" min="1" max="20" value="2" required>
            </div>
            <div class="form-group">
                <label>Date and Time</label>
                <input type="datetime-local" name="reservation_time" required>
            </div>
            <div class="form-group">
                <label>Special Requests</label>
                <textarea name="special_requests" rows="3" placeholder="Birthday, window seat, etc."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Confirm Booking</button>
        </form>
    </div>
</body>
</html>
